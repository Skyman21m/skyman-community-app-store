  - https://raw.githubusercontent.com/getAlby/umbrel-community-app-store/master/alby-albyhub/images/store.png
  - https://raw.githubusercontent.com/getAlby/umbrel-community-app-store/master/alby-albyhub/images/node.png
releaseNotes: >-
  First test build. Adds a "Nostr Relay" section in General Settings: dropdown
  of main public relays plus a Custom wss:// option. Restart required after
